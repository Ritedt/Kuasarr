name: Unified CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docker/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch: 1.12.4→1.12.5, minor: 1.12.4→1.13.0, major: 1.12.4→2.0.0)'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      skip_pypi:
        description: 'Skip PyPI upload'
        type: boolean
        default: false

env:
  GHCR_ENDPOINT: "ghcr.io/ritedt/kuasarr"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════
  # VERSION OUTPUT (auto-increment from last Git tag)
  # ═══════════════════════════════════════════════════════════════
  version-output:
    name: Output Version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Auto-increment version from last Git tag
        id: get-version
        run: |
          set -euo pipefail

          # Helper: compare two semver strings, returns 0 if $1 > $2
          ver_gt() {
            IFS=. read -r a1 b1 c1 <<< "$1"
            IFS=. read -r a2 b2 c2 <<< "$2"
            [ "$a1" -gt "$a2" ] && return 0
            [ "$a1" -lt "$a2" ] && return 1
            [ "$b1" -gt "$b2" ] && return 0
            [ "$b1" -lt "$b2" ] && return 1
            [ "$c1" -gt "$c2" ] && return 0
            return 1
          }

          # Fetch all tags
          git fetch --tags

          # Get latest tag matching strict semver (vMAJOR.MINOR.PATCH only, no suffixes)
          latest_tag=$(git tag -l 'v*.*.*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)
          latest_version="${latest_tag#v}"

          # Determine bump type (default: patch for push events)
          BUMP_TYPE="${{ inputs.version_bump || 'patch' }}"

          if [ -z "$latest_tag" ]; then
            # No git tag yet – seed from version.json (initial repo setup)
            new_version=$(jq -re '.version' version.json 2>/dev/null) || {
              echo "ERROR: Could not read version from version.json" >&2; exit 1
            }
          else
            # Remove 'v' prefix and increment based on bump type
            IFS=. read -r major minor patch <<< "$latest_version"
            case "$BUMP_TYPE" in
              major)
                new_version="$((major + 1)).0.0"
                ;;
              minor)
                new_version="${major}.$((minor + 1)).0"
                ;;
              *)
                new_version="${major}.${minor}.$((patch + 1))"
                ;;
            esac
          fi

          # Check Hier_Version_Ändern.txt for manual version override
          OVERRIDE_FILE="Hier_Version_Ändern.txt"
          if [ -f "$OVERRIDE_FILE" ]; then
            file_version=$(tr -d '[:space:]' < "$OVERRIDE_FILE")
            if [[ "$file_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              if [ -z "$latest_version" ] || ver_gt "$file_version" "$latest_version"; then
                echo "Version override from $OVERRIDE_FILE: $file_version (replaces auto-bump $new_version)"
                new_version="$file_version"
              else
                echo "Version in $OVERRIDE_FILE ($file_version) is not newer than last tag ($latest_version) – ignoring"
              fi
            else
              echo "WARNING: $OVERRIDE_FILE contains invalid version '$file_version' – ignoring"
            fi
          fi

          echo "version=${new_version}" >> $GITHUB_OUTPUT
          echo "Building version: ${new_version} (previous: ${latest_tag:-none})"

  # ═══════════════════════════════════════════════════════════════
  # DETECT CHANGES
  # ═══════════════════════════════════════════════════════════════
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      docker: ${{ steps.filter.outputs.docker }}
      version-file: ${{ steps.filter.outputs.version-file }}
      webui: ${{ steps.filter.outputs.webui }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 100

      - name: Detect Changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - 'kuasarr/**'
              - 'setup.py'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'uv.lock'
              - 'Kuasarr.py'
              - 'MANIFEST.in'
              - '.github/workflows/**'
            docker:
              - 'Dockerfile'
              - 'kuasarr/**'
              - 'requirements.txt'
              - 'uv.lock'
            version-file:
              - 'version.json'
            webui:
              - 'kuasarr/webui/**'

  # ═══════════════════════════════════════════════════════════════
  # PR VERSION BUMP CHECK
  # ═══════════════════════════════════════════════════════════════
  check-version:
    name: PR Version Bump Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.version-file == 'true'
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: main
          path: base

      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          path: pr

      - name: Compare versions
        run: |
          set -euo pipefail
          OLD_VERSION=$(jq -r .version base/version.json)
          NEW_VERSION=$(jq -r .version pr/version.json)
          echo "Old Version: $OLD_VERSION"
          echo "New Version: $NEW_VERSION"
          if [ "$OLD_VERSION" == "$NEW_VERSION" ]; then
            echo "Version has not been bumped!"
            exit 1
          fi
          echo "Version bump OK: $OLD_VERSION → $NEW_VERSION"

  # ═══════════════════════════════════════════════════════════════
  # IMPORT SMOKE TEST (PRs only)
  # ═══════════════════════════════════════════════════════════════
  smoke-test:
    name: Import Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: detect-changes
    if: |
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install dependencies
        run: |
          set -euo pipefail
          uv sync

      - name: Run import smoke test
        run: |
          set -euo pipefail
          python - <<'EOF'
          import sys
          modules = [
              "kuasarr",
              "kuasarr.api",
              "kuasarr.api.captcha",
              "kuasarr.api.arr",
              "kuasarr.api.config",
              "kuasarr.api.dbc",
              "kuasarr.api.hosters",
              "kuasarr.api.statistics",
              "kuasarr.downloads",
              "kuasarr.downloads.packages",
              "kuasarr.providers",
              "kuasarr.providers.captcha",
              "kuasarr.providers.captcha.dbc_dispatcher",
              "kuasarr.providers.hosters",
              "kuasarr.providers.version",
              "kuasarr.search",
              "kuasarr.storage",
          ]
          failed = []
          for mod in modules:
              try:
                  __import__(mod)
                  print(f"  OK  {mod}")
              except Exception as e:
                  print(f"  FAIL {mod}: {e}", file=sys.stderr)
                  failed.append(mod)
          if failed:
              print(f"\n{len(failed)} import(s) failed!", file=sys.stderr)
              sys.exit(1)
          print(f"\nAll {len(modules)} imports OK")
          EOF

  # ═══════════════════════════════════════════════════════════════
  # KIMI CODE REVIEW (PRs only)
  # ═══════════════════════════════════════════════════════════════
  kimi-review:
    name: Kimi Code Review
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      needs.detect-changes.outputs.python == 'true'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Review with Kimi
        uses: actions/github-script@v8
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        with:
          script: |
            try {
              const apiKey = process.env.KIMI_API_KEY;
              if (!apiKey) {
                console.log('⚠️ KIMI_API_KEY not configured, skipping review');
                return;
              }

              // Get PR diff
              const { data: diff } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                mediaType: { format: 'diff' }
              });

              if (!diff || diff.length < 50) {
                console.log('ℹ️ No significant changes to review');
                return;
              }

              // Truncate if too large (keep first ~150KB)
              const truncatedDiff = diff.slice(0, 150000) + (diff.length > 150000 ? '\n\n... (truncated)' : '');

              // Call Kimi API with 60s timeout
              const controller = new AbortController();
              const timeout = setTimeout(() => controller.abort(), 60000);

              let response;
              try {
                response = await fetch('https://api.kimi.com/coding/v1/messages', {
                  method: 'POST',
                  signal: controller.signal,
                  headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01'
                  },
                  body: JSON.stringify({
                    model: 'kimi-for-coding',
                    max_tokens: 4000,
                    messages: [{
                      role: 'user',
                      content: `Review this pull request. Focus on: 1) Security issues 2) Bugs 3) Code quality 4) Performance\n\n\`\`\`diff\n${truncatedDiff}\n\`\`\``
                    }]
                  })
                });
              } finally {
                clearTimeout(timeout);
              }

              if (!response.ok) {
                const text = await response.text().catch(() => '');
                console.log(`❌ Kimi API error: ${response.status} ${response.statusText}`, text);
                return;
              }

              const data = await response.json();
              const reviewText = data.content?.[0]?.text || 'Unable to generate review';

              // Post or update comment
              const body = `🤖 **Kimi Code Review**\n\n${reviewText}\n\n---\n*Reviewed by [Kimi](https://www.kimi.com)*`;

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });

              const existing = comments.find(c => c.body?.includes('🤖 **Kimi Code Review**'));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body
                });
              }
            } catch (err) {
              console.log('❌ Kimi review failed:', err.message);
            }

  # ═══════════════════════════════════════════════════════════════
  # BUILD WEBUI
  # ═══════════════════════════════════════════════════════════════
  build-webui:
    name: Build WebUI
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && needs.detect-changes.outputs.webui == 'true')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('kuasarr/webui/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: |
          set -euo pipefail
          cd kuasarr/webui
          npm ci --legacy-peer-deps

      - name: Build WebUI
        run: |
          set -euo pipefail
          cd kuasarr/webui
          npm run build

      - name: Upload WebUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: webui-dist
          path: kuasarr/webui/dist

  # ═══════════════════════════════════════════════════════════════
  # BETA VERSION (PRs only)
  # ═══════════════════════════════════════════════════════════════
  beta-version:
    name: Beta Version
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event_name == 'pull_request'
    outputs:
      version: ${{ steps.version.outputs.version }}
      epoch: ${{ steps.version.outputs.epoch }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Fetch all tags to find the latest release
          git fetch --tags

          # Get latest tag matching strict semver (vMAJOR.MINOR.PATCH only, no suffixes)
          latest_tag=$(git tag -l 'v*.*.*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)

          if [ -z "$latest_tag" ]; then
            # No git tag yet – seed from root version.json
            if [ ! -f version.json ]; then
              echo "ERROR: version.json not found" >&2; exit 1
            fi
            BASE_VERSION=$(jq -re .version version.json)
          else
            BASE_VERSION="${latest_tag#v}"
          fi

          if [[ ! "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid semver base: '$BASE_VERSION'" >&2; exit 1
          fi

          # Increment patch by 1
          IFS=. read -r major minor patch <<< "$BASE_VERSION"
          NEXT_VERSION="${major}.${minor}.$((patch + 1))"

          # Count workflow runs for this PR branch to get the beta run counter
          BETA_COUNT=$(curl -s \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/unified-ci.yml/runs?branch=${{ github.head_ref }}&event=pull_request&per_page=1" \
            | jq -r '.total_count // empty')
          if ! [[ "${BETA_COUNT:-}" =~ ^[0-9]+$ ]] || [ "${BETA_COUNT:-0}" -lt 1 ]; then
            BETA_COUNT=1
          fi

          BETA_VERSION="${NEXT_VERSION}-beta${BETA_COUNT}"

          EPOCH=$(date +%s)
          echo "version=$BETA_VERSION" >> $GITHUB_OUTPUT
          echo "epoch=$EPOCH" >> $GITHUB_OUTPUT
          echo "Beta version: $BETA_VERSION (based on latest tag: ${latest_tag:-none}, run #${BETA_COUNT})"

  # ═══════════════════════════════════════════════════════════════
  # BETA BUILD WHEEL (PRs only)
  # ═══════════════════════════════════════════════════════════════
  beta-build-wheel:
    name: Beta Build Wheel
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [beta-version, build-webui]
    if: github.event_name == 'pull_request'
    outputs:
      attestation-id: ${{ steps.attest.outputs.attestation-id }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download WebUI artifact
        uses: actions/download-artifact@v7
        with:
          name: webui-dist
          path: kuasarr/webui/dist

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install build dependencies
        run: |
          set -euo pipefail
          uv sync

      - name: Patch version.json with beta version
        env:
          BETA_VERSION: ${{ needs.beta-version.outputs.version }}
        run: |
          set -euo pipefail
          echo "{\"version\": \"$BETA_VERSION\"}" > version.json
          echo "{\"version\": \"$BETA_VERSION\"}" > kuasarr/version.json
          echo "Patched version.json with: $BETA_VERSION"

      - name: Build Wheel
        run: |
          set -euo pipefail
          uv build

      - id: attest
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*.whl"

      - uses: actions/upload-artifact@v7
        with:
          name: beta-wheel
          path: dist/*.whl

  # ═══════════════════════════════════════════════════════════════
  # BETA BUILD WINDOWS EXE (PRs only)
  # ═══════════════════════════════════════════════════════════════
  beta-build-exe:
    name: Beta Build Windows EXE
    runs-on: windows-latest
    timeout-minutes: 10
    needs: [beta-version, build-webui]
    if: github.event_name == 'pull_request'
    env:
      TMP: "D:\\a\\temp"
      TEMP: "D:\\a\\temp"
      PYINSTALLER_CONFIG_DIR: ".pyinstaller-cache"
    steps:
      - shell: powershell
        run: mkdir D:\a\temp -Force

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download WebUI artifact
        uses: actions/download-artifact@v7
        with:
          name: webui-dist
          path: kuasarr/webui/dist

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Cache PyInstaller Analysis
        uses: actions/cache@v5
        with:
          path: |
            build
            .pyinstaller-cache
          key: pyinstaller-analysis-${{ runner.os }}-beta-${{ hashFiles('uv.lock') }}
          restore-keys: |
            pyinstaller-analysis-${{ runner.os }}-beta-

      - name: Disable Real-time Monitoring
        shell: powershell
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          uv sync --group dev

      - name: Patch version.json with beta version
        shell: bash
        env:
          VERSION: ${{ needs.beta-version.outputs.version }}
        run: |
          set -euo pipefail
          echo "{\"version\": \"$VERSION\"}" > version.json
          echo "{\"version\": \"$VERSION\"}" > kuasarr/version.json
          echo "Patched version.json with: $VERSION"

      - name: Build EXE
        shell: bash
        env:
          VERSION: ${{ needs.beta-version.outputs.version }}
        run: |
          set -euo pipefail
          echo "Building beta EXE with version: $VERSION"
          python kuasarr/providers/version.py
          pyinstaller --noconfirm --onefile --console --add-data "kuasarr/static;kuasarr/static" --add-data "kuasarr/webui/dist;kuasarr/webui/dist" --add-data "version.json;." --version-file "file_version_info.txt" --name "kuasarr" Kuasarr.py

      - uses: actions/upload-artifact@v7
        with:
          name: beta-exe
          path: dist/kuasarr.exe

  # ═══════════════════════════════════════════════════════════════
  # BETA BUILD DOCKER amd64 (PRs only)
  # ═══════════════════════════════════════════════════════════════
  beta-build-docker-amd64:
    name: Beta Build Docker (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [beta-version, beta-build-wheel]
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/download-artifact@v7
        with:
          name: beta-wheel
          path: ./dist

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: VERSION=${{ needs.beta-version.outputs.version }}
          tags: |
            ${{ env.GHCR_ENDPOINT }}:beta-amd64
            ${{ env.GHCR_ENDPOINT }}:${{ needs.beta-version.outputs.version }}-beta-amd64
          cache-from: type=gha,scope=beta-amd64
          cache-to: type=gha,mode=max,scope=beta-amd64

  # ═══════════════════════════════════════════════════════════════
  # BETA BUILD DOCKER arm64 (PRs only – native runner)
  # ═══════════════════════════════════════════════════════════════
  beta-build-docker-arm64:
    name: Beta Build Docker (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    needs: [beta-version, beta-build-wheel]
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/download-artifact@v7
        with:
          name: beta-wheel
          path: ./dist

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: VERSION=${{ needs.beta-version.outputs.version }}
          tags: |
            ${{ env.GHCR_ENDPOINT }}:beta-arm64
            ${{ env.GHCR_ENDPOINT }}:${{ needs.beta-version.outputs.version }}-beta-arm64
          cache-from: type=gha,scope=beta-arm64
          cache-to: type=gha,mode=max,scope=beta-arm64

  # ═══════════════════════════════════════════════════════════════
  # BETA MERGE DOCKER MANIFEST (PRs only)
  # ═══════════════════════════════════════════════════════════════
  beta-merge-manifest:
    name: Beta Merge Docker Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [beta-version, beta-build-docker-amd64, beta-build-docker-arm64]
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge manifests
        run: |
          set -euo pipefail
          TAG_AMD64="${{ needs.beta-version.outputs.version }}-beta-amd64"
          TAG_ARM64="${{ needs.beta-version.outputs.version }}-beta-arm64"

          docker buildx imagetools create -t ${{ env.GHCR_ENDPOINT }}:beta \
            ${{ env.GHCR_ENDPOINT }}:beta-amd64 \
            ${{ env.GHCR_ENDPOINT }}:beta-arm64

          docker buildx imagetools create -t ${{ env.GHCR_ENDPOINT }}:${{ needs.beta-version.outputs.version }}-beta \
            ${{ env.GHCR_ENDPOINT }}:${TAG_AMD64} \
            ${{ env.GHCR_ENDPOINT }}:${TAG_ARM64}

  # ═══════════════════════════════════════════════════════════════
  # BETA RELEASE (PRs only)
  # ═══════════════════════════════════════════════════════════════
  beta-release:
    name: Beta Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [beta-version, beta-build-wheel, beta-build-exe, beta-merge-manifest]
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Move beta tag to current commit
        env:
          TARGET_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "Moving beta tag to $TARGET_SHA"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f beta "$TARGET_SHA"
          git push origin refs/tags/beta --force

      - uses: actions/download-artifact@v7
        with:
          name: beta-wheel
          path: ./wheel

      - uses: actions/download-artifact@v7
        with:
          name: beta-exe
          path: ./exe

      - id: changelog
        continue-on-error: true
        uses: metcalfc/changelog-generator@v4.6.2
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release Body
        run: |
          set -euo pipefail
          echo "### Docker:" >> release_body.md
          echo "\`docker pull ${{ env.GHCR_ENDPOINT }}:beta\`" >> release_body.md
          echo "" >> release_body.md
          echo "### Changelog:" >> release_body.md
          echo "${{ steps.changelog.outputs.changelog || 'No changelog available' }}" >> release_body.md
          echo "" >> release_body.md
          echo "[Attestation](https://github.com/${{ github.repository }}/attestations/${{ needs.beta-build-wheel.outputs.attestation-id }})" >> release_body.md

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "./wheel/*.whl,./exe/*.exe"
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          tag: beta
          name: "${{ needs.beta-version.outputs.version }} (${{ needs.beta-version.outputs.epoch }})"
          bodyFile: "release_body.md"
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # BETA NOTIFY PR (PRs only)
  # ═══════════════════════════════════════════════════════════════
  beta-notify:
    name: Beta Notify PR
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [beta-version, beta-release]
    if: github.event_name == 'pull_request' && needs.beta-release.result == 'success'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.beta-version.outputs.version }}
          EPOCH: ${{ needs.beta-version.outputs.epoch }}
        run: |
          set -euo pipefail
          RELEASE_BODY=$(gh release view beta --json body --jq .body 2>/dev/null || echo "Beta release created")
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -n "$PR_NUMBER" ]; then
            printf "## 🚀 Beta Release %s (%s) is Live!\n\n%s\n" "$VERSION" "$EPOCH" "$RELEASE_BODY" > pr_comment.md
            gh pr comment "$PR_NUMBER" --body-file pr_comment.md
          fi

  # ═══════════════════════════════════════════════════════════════
  # BUILD WHEEL (amd64/pure Python)
  # ═══════════════════════════════════════════════════════════════
  build-wheel:
    name: Build Wheel
    runs-on: ubuntu-latest
    needs: [version-output, build-webui]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download WebUI artifact
        uses: actions/download-artifact@v7
        with:
          name: webui-dist
          path: kuasarr/webui/dist

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Inject version into all version files
        run: |
          set -euo pipefail
          VERSION="${{ needs.version-output.outputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid semver format: $VERSION" >&2; exit 1
          fi
          jq -n --arg v "$VERSION" '{"version": $v}' > version.json
          jq -n --arg v "$VERSION" '{"version": $v}' > kuasarr/version.json
          echo "Injected version ${VERSION} into version.json and kuasarr/version.json"

      - name: Install build dependencies
        run: |
          set -euo pipefail
          uv sync
      - name: Build Wheel
        env:
          VERSION: ${{ needs.version-output.outputs.version }}
        run: |
          set -euo pipefail
          echo "Building wheel with version: $VERSION"
          uv build
      - uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: dist/*.whl

  # ═══════════════════════════════════════════════════════════════
  # BUILD WINDOWS EXE
  # ═══════════════════════════════════════════════════════════════
  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: [version-output, build-webui]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download WebUI artifact
        uses: actions/download-artifact@v7
        with:
          name: webui-dist
          path: kuasarr/webui/dist

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Inject version into all version files
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version-output.outputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid semver format: $VERSION" >&2; exit 1
          fi
          jq -n --arg v "$VERSION" '{"version": $v}' > version.json
          jq -n --arg v "$VERSION" '{"version": $v}' > kuasarr/version.json
          echo "Injected version ${VERSION} into version.json and kuasarr/version.json"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          uv sync --group dev
      - name: Build EXE
        shell: bash
        env:
          VERSION: ${{ needs.version-output.outputs.version }}
        run: |
          set -euo pipefail
          echo "Building EXE with version: $VERSION"
          python kuasarr/providers/version.py
          pyinstaller --noconfirm --onefile --console --add-data "kuasarr/static;kuasarr/static" --add-data "kuasarr/webui/dist;kuasarr/webui/dist" --add-data "version.json;." --version-file "file_version_info.txt" --name "kuasarr" Kuasarr.py
      - uses: actions/upload-artifact@v7
        with:
          name: exe
          path: dist/kuasarr.exe

  # ═══════════════════════════════════════════════════════════════
  # BUILD DOCKER (amd64 + arm64)
  # ═══════════════════════════════════════════════════════════════
  build-docker:
    name: Build Docker (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [version-output, build-wheel]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Inject version into all version files
        run: |
          set -euo pipefail
          VERSION="${{ needs.version-output.outputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid semver format: $VERSION" >&2; exit 1
          fi
          jq -n --arg v "$VERSION" '{"version": $v}' > version.json
          jq -n --arg v "$VERSION" '{"version": $v}' > kuasarr/version.json
          echo "Injected version ${VERSION} into version.json and kuasarr/version.json"

      - uses: actions/download-artifact@v8
        with:
          name: wheel
          path: ./dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            VERSION=${{ needs.version-output.outputs.version }}
          tags: |
            ${{ env.GHCR_ENDPOINT }}:${{ needs.version-output.outputs.version }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            ${{ env.GHCR_ENDPOINT }}:latest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          labels: |
            org.opencontainers.image.version=${{ needs.version-output.outputs.version }}

  # ═══════════════════════════════════════════════════════════════
  # MERGE DOCKER MANIFEST (amd64 + arm64 → multi-arch)
  # ═══════════════════════════════════════════════════════════════
  merge-manifest:
    name: Merge Docker Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [version-output, build-docker]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge manifests
        run: |
          set -euo pipefail
          VERSION="${{ needs.version-output.outputs.version }}"

          docker buildx imagetools create \
            -t ${{ env.GHCR_ENDPOINT }}:${VERSION} \
            -t ${{ env.GHCR_ENDPOINT }}:latest \
            ${{ env.GHCR_ENDPOINT }}:${VERSION}-amd64 \
            ${{ env.GHCR_ENDPOINT }}:${VERSION}-arm64

  # ═══════════════════════════════════════════════════════════════
  # AUTO TAG (create Git tag after successful builds)
  # ═══════════════════════════════════════════════════════════════
  auto-tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: [version-output, build-wheel, build-exe, build-docker, merge-manifest]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Git Tag
        env:
          VERSION: ${{ needs.version-output.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          echo "Creating tag: $TAG"

          # Check if tag already exists locally
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            exit 0
          fi

          # Check if tag exists on remote
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on remote, skipping"
            exit 0
          fi

          # Create and push tag
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Tag $TAG created and pushed successfully"

  # ═══════════════════════════════════════════════════════════════
  # CREATE GITHUB RELEASE + PYPI UPLOAD
  # ═══════════════════════════════════════════════════════════════
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version-output, auto-tag, build-wheel, build-exe, build-docker, merge-manifest]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Get Version
        id: version
        run: |
          set -euo pipefail
          VERSION="${{ needs.version-output.outputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Releasing version: ${VERSION}"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false  # disabled for reproducible releases

      - uses: actions/download-artifact@v8
        with:
          name: wheel
          path: ./dist

      - uses: actions/download-artifact@v8
        with:
          name: exe
          path: ./dist

      - name: Generate changelog
        id: changelog
        # continue-on-error: first release on a new repo has no previous release to compare against
        continue-on-error: true
        uses: metcalfc/changelog-generator@v4.6.2
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Warn if changelog fallback is used
        if: steps.changelog.outcome == 'failure' || steps.changelog.outputs.changelog == ''
        run: echo "::warning::Changelog generation failed or returned empty – using fallback release body"

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./dist/*.whl,./dist/*.exe"
          body: ${{ steps.changelog.outputs.changelog || 'Initial release' }}
          tag: v${{ steps.version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to PyPI
        if: ${{ !inputs.skip_pypi }}
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          set -euo pipefail
          uvx twine upload ./dist/*.whl -u __token__

  # ═══════════════════════════════════════════════════════════════
  # CI SUMMARY
  # ═══════════════════════════════════════════════════════════════
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, version-output, build-webui, build-wheel, build-exe, build-docker, merge-manifest, auto-tag, release, kimi-review, check-version, smoke-test, beta-version, beta-build-wheel, beta-build-exe, beta-build-docker-amd64, beta-build-docker-arm64, beta-merge-manifest, beta-release, beta-notify]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          set -euo pipefail
          echo "## 🚀 Kuasarr CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Version" >> $GITHUB_STEP_SUMMARY
          echo "- Release version: ${{ needs.version-output.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Beta version: ${{ needs.beta-version.outputs.version }} (${{ needs.beta-version.outputs.epoch }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Change Detection" >> $GITHUB_STEP_SUMMARY
          echo "- Python/Package: ${{ needs.detect-changes.outputs.python }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker: ${{ needs.detect-changes.outputs.docker }}" >> $GITHUB_STEP_SUMMARY
          echo "- Version file: ${{ needs.detect-changes.outputs.version-file }}" >> $GITHUB_STEP_SUMMARY
          echo "- WebUI: ${{ needs.detect-changes.outputs.webui }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### PR / Beta Job Status" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Import Smoke Test | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version Bump Check | ${{ needs.check-version.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Kimi Code Review | ${{ needs.kimi-review.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Beta Build Wheel | ${{ needs.beta-build-wheel.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Beta Build EXE | ${{ needs.beta-build-exe.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Beta Docker amd64 | ${{ needs.beta-build-docker-amd64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Beta Docker arm64 | ${{ needs.beta-build-docker-arm64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Beta Merge Manifest | ${{ needs.beta-merge-manifest.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Beta Release | ${{ needs.beta-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Beta Notify PR | ${{ needs.beta-notify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Job Status" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build WebUI | ${{ needs.build-webui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Wheel | ${{ needs.build-wheel.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Windows EXE | ${{ needs.build-exe.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Docker (amd64+arm64) | ${{ needs.build-docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Merge Docker Manifest | ${{ needs.merge-manifest.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Auto Tag | ${{ needs.auto-tag.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release & PyPI | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
